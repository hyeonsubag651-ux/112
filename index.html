<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>수학 문제 생성기</title>

<style>
body {
    background: #eef3ff;
    font-family: sans-serif;
    text-align: center;
    padding-top: 100px;
}

.box {
    background: white;
    width: 400px;
    margin: auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

h1 {
    color: #333;
}

#question {
    font-size: 30px;
    margin: 20px;
}

input {
    padding: 10px;
    width: 200px;
    font-size: 18px;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    font-size: 16px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="box">

    <h1>📘 수학 문제 생성기</h1>

    <div id="question">
        문제 생성중...
    </div>

    <input type="number" id="answer" placeholder="정답 입력">

    <br>

    <button onclick="checkAnswer()">정답 확인</button>
    <button onclick="generateQuestion()">새 문제</button>

    <div id="result"></div>

</div>

<script>

let num1;
let num2;
let correctAnswer;

function generateQuestion() {

    num1 = Math.floor(Math.random() * 100);
    num2 = Math.floor(Math.random() * 100);

    correctAnswer = num1 + num2;

    document.getElementById("question").innerText =
        num1 + " + " + num2 + " = ?";

    document.getElementById("answer").value = "";
    document.getElementById("result").innerText = "";
}

function checkAnswer() {

    let userAnswer =
        Number(document.getElementById("answer").value);

    if(userAnswer === correctAnswer) {

        document.getElementById("result").innerText =
            "🎉 정답입니다!";

    } else {

        document.getElementById("result").innerText =
            "❌ 오답! 정답은 " + correctAnswer;

    }
}

generateQuestion();

</script>

</body>
</html>
